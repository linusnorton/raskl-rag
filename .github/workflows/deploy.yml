name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      docproc: ${{ steps.filter.outputs.docproc }}
      chunker: ${{ steps.filter.outputs.chunker }}
      upload: ${{ steps.filter.outputs.upload }}
      infra: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.infra }}
      open_webui: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.open_webui }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            api:
              - 'apps/rag_engine/**'
              - 'apps/rag_engine/Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
            docproc:
              - 'apps/docproc/**'
              - 'apps/chunker_indexer/**'
              - 'apps/docproc/Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
            chunker:
              - 'apps/chunker_indexer/**'
              - 'apps/chunker_indexer/Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
            upload:
              - 'apps/upload/**'
            infra:
              - 'infra/**'
            open_webui:
              - 'infra/open-webui.tf'

  test:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.docproc == 'true' || needs.changes.outputs.chunker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run chunker tests
        run: uv run --package ras-chunker-indexer --extra dev pytest apps/chunker_indexer/tests/ -v

  build-api:
    needs: [test, changes]
    if: always() && needs.changes.outputs.api == 'true' && !failure() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push RAG API image
        run: |
          # Ensure ECR repo exists (handles rename from raskl-chat → raskl-rag-api)
          aws ecr describe-repositories --repository-names raskl-rag-api 2>/dev/null || \
            aws ecr create-repository --repository-name raskl-rag-api --image-tag-mutability MUTABLE

          IMAGE="${{ steps.ecr-login.outputs.registry }}/raskl-rag-api:${{ steps.meta.outputs.sha }}"
          docker build -f apps/rag_engine/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

  build-docproc:
    needs: [test, changes]
    if: always() && needs.changes.outputs.docproc == 'true' && !failure() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push docproc image
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/raskl-docproc:${{ steps.meta.outputs.sha }}"
          docker build -f apps/docproc/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

  build-chunker:
    needs: [test, changes]
    if: always() && needs.changes.outputs.chunker == 'true' && !failure() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push chunker image
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/raskl-chunker:${{ steps.meta.outputs.sha }}"
          docker build -f apps/chunker_indexer/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

  mirror-open-webui:
    needs: changes
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Mirror Open WebUI image to ECR (skip if unchanged)
        run: |
          ECR_REPO="${{ steps.ecr-login.outputs.registry }}/raskl-open-webui"

          # Ensure ECR repo exists
          aws ecr describe-repositories --repository-names raskl-open-webui 2>/dev/null || \
            aws ecr create-repository --repository-name raskl-open-webui --image-tag-mutability MUTABLE

          # Get upstream GHCR digest (without pulling the image)
          GHCR_DIGEST=$(docker manifest inspect ghcr.io/open-webui/open-webui:main -v 2>/dev/null | jq -r 'if type == "array" then .[0].Descriptor.digest else .Descriptor.digest end')

          # Get current ECR digest
          ECR_DIGEST=$(aws ecr batch-get-image --repository-name raskl-open-webui --image-ids imageTag=latest \
            --query 'images[0].imageId.imageDigest' --output text 2>/dev/null || echo "none")

          # Config change forces mirror regardless of digest
          FORCE_MIRROR="${{ needs.changes.outputs.open_webui }}"

          if [ "$GHCR_DIGEST" = "$ECR_DIGEST" ] && [ "$FORCE_MIRROR" != "true" ]; then
            echo "Open WebUI image unchanged (digest: ${GHCR_DIGEST}), skipping mirror"
          else
            echo "Mirroring Open WebUI (GHCR: ${GHCR_DIGEST}, ECR: ${ECR_DIGEST}, force: ${FORCE_MIRROR})"
            docker pull ghcr.io/open-webui/open-webui:main
            docker tag ghcr.io/open-webui/open-webui:main "${ECR_REPO}:latest"
            docker push "${ECR_REPO}:latest"
          fi

  deploy:
    needs: [changes, build-api, build-docproc, build-chunker, mirror-open-webui]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.urls.outputs.open_webui_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: needs.changes.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: needs.changes.outputs.infra == 'true'
        working-directory: infra
        run: terraform init

      - name: Import pre-existing resources into Terraform state
        if: needs.changes.outputs.infra == 'true'
        working-directory: infra
        run: |
          # Import ECR repos if they exist but aren't in state yet (handles renames + first deploy)
          terraform import \
            -var="neon_api_key=${{ secrets.NEON_API_KEY }}" \
            -var="upload_password_hash=${{ secrets.UPLOAD_PASSWORD_HASH }}" \
            -var="rag_api_key=${{ secrets.CHAT_API_KEY }}" \
            aws_ecr_repository.chunker raskl-chunker 2>/dev/null || true

          terraform import \
            -var="neon_api_key=${{ secrets.NEON_API_KEY }}" \
            -var="upload_password_hash=${{ secrets.UPLOAD_PASSWORD_HASH }}" \
            -var="rag_api_key=${{ secrets.CHAT_API_KEY }}" \
            aws_ecr_repository.rag_api raskl-rag-api 2>/dev/null || true

      - name: Build db-init Lambda package
        if: needs.changes.outputs.infra == 'true'
        working-directory: infra
        run: |
          mkdir -p .build/db-init-pkg
          pip install --target .build/db-init-pkg --platform manylinux2014_x86_64 --python-version 3.11 --only-binary=:all: psycopg2-binary -q
          cp lambda-db-init/handler.py .build/db-init-pkg/
          cd .build/db-init-pkg && zip -r ../db-init.zip . -q

      - name: Terraform Plan
        if: needs.changes.outputs.infra == 'true'
        working-directory: infra
        run: |
          terraform plan \
            -var="rag_api_image_tag=${{ needs.build-api.outputs.image_tag || 'latest' }}" \
            -var="docproc_image_tag=${{ needs.build-docproc.outputs.image_tag || 'latest' }}" \
            -var="chunker_image_tag=${{ needs.build-chunker.outputs.image_tag || 'latest' }}" \
            -var="neon_api_key=${{ secrets.NEON_API_KEY }}" \
            -var="upload_password_hash=${{ secrets.UPLOAD_PASSWORD_HASH }}" \
            -var="rag_api_key=${{ secrets.CHAT_API_KEY }}" \
            -out=tfplan

      - name: Terraform Apply
        if: needs.changes.outputs.infra == 'true'
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      - name: Update Lambda images
        run: |
          # Update RAG API Lambda if API was rebuilt
          if [ -n "${{ needs.build-api.outputs.image_tag }}" ]; then
            RAG_API_REPO=$(aws ecr describe-repositories --repository-names raskl-rag-api --query 'repositories[0].repositoryUri' --output text)
            aws lambda update-function-code \
              --function-name raskl-rag-api \
              --image-uri "${RAG_API_REPO}:${{ needs.build-api.outputs.image_tag }}"
          fi

          # Update docproc Lambda if docproc was rebuilt
          if [ -n "${{ needs.build-docproc.outputs.image_tag }}" ]; then
            DOCPROC_REPO=$(aws ecr describe-repositories --repository-names raskl-docproc --query 'repositories[0].repositoryUri' --output text)
            aws lambda update-function-code \
              --function-name raskl-docproc \
              --image-uri "${DOCPROC_REPO}:${{ needs.build-docproc.outputs.image_tag }}"
          fi

          # Update chunker Lambda if chunker was rebuilt
          if [ -n "${{ needs.build-chunker.outputs.image_tag }}" ]; then
            CHUNKER_REPO=$(aws ecr describe-repositories --repository-names raskl-chunker --query 'repositories[0].repositoryUri' --output text)
            aws lambda update-function-code \
              --function-name raskl-chunker \
              --image-uri "${CHUNKER_REPO}:${{ needs.build-chunker.outputs.image_tag }}"
          fi

      - name: Update upload Lambda
        if: needs.changes.outputs.upload == 'true'
        run: |
          cd apps/upload && zip -r /tmp/upload.zip handler.py template.html
          aws lambda update-function-code \
            --function-name raskl-upload \
            --zip-file fileb:///tmp/upload.zip

      - name: Get deployment URLs
        id: urls
        run: |
          OPEN_WEBUI_URL=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='raskl-open-webui'].ServiceUrl" --output text)
          echo "open_webui_url=https://${OPEN_WEBUI_URL}" >> "$GITHUB_OUTPUT"
